version: "3.9"

services:
  herr-freud:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ${HERR_FREUD_DATA_FOLDER:-./data}:/data
    depends_on:
      - stt-sidecar
    restart: unless-stopped
    networks:
      - herr-freud-net

  stt-sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    environment:
      - STT_MODEL=${STT_MODEL:-large-v3}
    volumes:
      - ${HERR_FREUD_DATA_FOLDER:-./data}:/data
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks:
      - herr-freud-net

networks:
  herr-freud-net:
    driver: bridge
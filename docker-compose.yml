version: "3.9"

services:
  herr-freud:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - IAMQ_HTTP_URL=http://host.docker.internal:18790
      - IAMQ_WS_URL=ws://host.docker.internal:18793/ws
      - IAMQ_AGENT_ID=${IAMQ_AGENT_ID:-herr_freud_agent}
      - HERR_FREUD_DATA_FOLDER=${HERR_FREUD_DATA_FOLDER:-./data}
      - HERR_FREUD_DB_PATH=${HERR_FREUD_DB_PATH:-/data/herr_freud.db}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - STT_SIDECAR_URL=http://stt-sidecar:9001
      - EMBEDDINGS_URL=http://host.docker.internal:18795
    volumes:
      - ${HERR_FREUD_DATA_FOLDER:-./data}:/data
      - ../skills-cli:/skills-cli:ro
      - ../skills:/workspace/skills:rw
      - ./skills:/agent/skills:rw
    depends_on:
      - stt-sidecar
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - herr-freud-net

  stt-sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    environment:
      - STT_MODEL=${STT_MODEL:-large-v3}
    volumes:
      - ${HERR_FREUD_DATA_FOLDER:-./data}:/data
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks:
      - herr-freud-net

networks:
  herr-freud-net:
    driver: bridge